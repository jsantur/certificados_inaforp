app = 'certificados-inaforp-db'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'
  build-context = '../..'

[env]
  MARIADB_DATABASE = 'certificados_db'

[[mounts]]
  source = 'mysql_data'
  destination = '/var/lib/mysql'

[[services]]
  protocol = 'tcp'
  internal_port = 3306
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.tcp_checks]]
    grace_period = '20s'
    interval = '15s'
    timeout = '2s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
